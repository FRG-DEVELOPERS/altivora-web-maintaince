<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Altivora AI Core - Maintenance</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    height:100vh;
    background: radial-gradient(circle at center, #020412, #000);
    font-family:'Inter',sans-serif;
    color:white;
    overflow:hidden;
}

/* animated grid */
.grid{
    position:absolute;
    width:200%;
    height:200%;
    background:linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
               linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
    background-size:50px 50px;
    transform:rotateX(60deg);
    animation:gridMove 10s linear infinite;
}

@keyframes gridMove{
    from{transform:rotateX(60deg) translateY(0)}
    to{transform:rotateX(60deg) translateY(-50px)}
}

/* center container */
.container{
    position:relative;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* robot eye */
.eye{
    width:140px;
    height:140px;
    border-radius:50%;
    background: radial-gradient(circle, #00fff0, #0077ff, #001);
    box-shadow:0 0 60px #00eaff, 0 0 120px #0077ff;
    animation:pulse 2s infinite alternate;
    margin-bottom:30px;
    position:relative;
}

.eye::after{
    content:'';
    position:absolute;
    width:40px;
    height:40px;
    background:white;
    border-radius:50%;
    top:30%;
    left:30%;
    opacity:.9;
}

@keyframes pulse{
    from{transform:scale(1)}
    to{transform:scale(1.15)}
}

/* title */
.title{
    font-family:'Orbitron';
    font-size:60px;
    background:linear-gradient(90deg,#00eaff,#00ffa6,#ff00ff);
    -webkit-background-clip:text;
    color:transparent;
    margin-bottom:10px;
}

/* status */
.status{
    font-size:22px;
    letter-spacing:2px;
    margin-bottom:15px;
    opacity:.9;
}

/* description */
.desc{
    font-size:14px;
    opacity:.6;
    max-width:500px;
    margin-bottom:30px;
}

/* terminal */
.terminal{
    width:550px;
    max-width:90%;
    height:150px;
    background:rgba(0,0,0,0.6);
    border:1px solid rgba(0,255,255,0.2);
    border-radius:12px;
    padding:15px;
    text-align:left;
    font-family:monospace;
    font-size:13px;
    overflow:hidden;
    box-shadow:0 0 25px rgba(0,255,255,0.2);
}

/* scanline effect */
.scan{
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(rgba(255,255,255,0.03) 50%, transparent 50%);
    background-size:100% 4px;
    pointer-events:none;
}

/* particles */
.particle{
    position:absolute;
    width:3px;
    height:3px;
    border-radius:50%;
    background:cyan;
    opacity:.7;
    animation:float linear infinite;
}

@keyframes float{
    from{transform:translateY(100vh)}
    to{transform:translateY(-10vh)}
}

/* glow waves */
.wave{
    position:absolute;
    width:300px;
    height:300px;
    border-radius:50%;
    border:1px solid rgba(0,255,255,0.2);
    animation:expand 3s infinite;
}

@keyframes expand{
    from{transform:scale(.5);opacity:.6}
    to{transform:scale(2);opacity:0}
}

</style>
</head>

<body>

<div class="grid"></div>
<div class="scan"></div>

<div class="container">

    <div class="eye"></div>

    <div class="title">ALTIVORA AI</div>

    <div class="status">SYSTEM UPGRADING</div>

    <div class="desc">
        Neural infrastructure is being optimized. Core services will resume shortly.
    </div>

    <div class="terminal" id="terminal"></div>

</div>

<script>
const lines=[
"[AI] Booting Altivora Core...",
"[SYS] Loading neural modules...",
"[NET] Establishing connections...",
"[WARN] Maintenance mode enabled",
"[AI] Optimizing routing engine...",
"[OK] Security layers active",
"[SYS] Recalibrating clusters...",
"[OK] All systems stabilizing..."
];

let term=document.getElementById("terminal");
let i=0,j=0;

function type(){
    if(i<lines.length){
        if(j<lines[i].length){
            term.innerHTML+=lines[i][j];
            j++;
            setTimeout(type,20);
        }else{
            term.innerHTML+="<br>";
            i++; j=0;
            setTimeout(type,250);
        }
    }else{
        term.innerHTML+="<br>> AI awaiting commands...";
    }
}
type();

/* particles */
for(let i=0;i<80;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(5+Math.random()*10)+"s";
    document.body.appendChild(p);
}

/* waves */
setInterval(()=>{
    let w=document.createElement("div");
    w.className="wave";
    w.style.top="50%";
    w.style.left="50%";
    w.style.transform="translate(-50%,-50%)";
    document.body.appendChild(w);
    setTimeout(()=>w.remove(),3000);
},1000);

</script>

</body>
</html>
